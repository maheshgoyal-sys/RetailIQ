server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/auth/**

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/customers/**

        - id: segmentation-service
          uri: ${SEGMENTATION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/segments/**

        - id: lead-service
          uri: ${LEAD_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/leads/**

        - id: campaign-service
          uri: ${CAMPAIGN_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/campaigns/**

