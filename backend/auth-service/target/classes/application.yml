server:
  port: 8085

spring:
  application:
    name: auth-service

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/retailiq_auth}

jwt:
  # Using a secure HMAC 256-bit key in Hex or Base64 (configured here via env or hardcoded default for dev)
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3VyZS0yNTYtYml0LXNlY3JldC1rZXktZm9yLXJldGFpbGlxLWZ1bGwtc3RhY2stYXBwbGljYXRpb24=}
  expiration: 86400000 # 24 hours in ms
  refreshExpiration: 604800000 # 7 days in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
